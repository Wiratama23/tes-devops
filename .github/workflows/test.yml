name: Unit Tests

on:
    push:
        branches:
            - '**'
    pull_request:
        branches:
            - '**'

jobs:
    golangci:
        name: lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                go-version: stable
            - name: golangci-lint
              uses: golangci/golangci-lint-action@v9
              with:
                version: v2.11
                working-directory: backend
    test:
        name: test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                go-version: stable
            - name: Run backend tests
              run: |
                cd backend
                go test -v ./...