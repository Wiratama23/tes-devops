name: CI/CD Deployment

on:
  workflow_dispatch:
    

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: wiratama23/tes-devops

jobs:

  verify-tests:
    name: Verify Previous Tests Passed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        
      - name: Check test.yml status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONCLUSION=$(gh run list --workflow="test.yml" --branch=${{ github.ref_name }} --limit 1 --json conclusion -q '.[0].conclusion')
          if [ "$CONCLUSION" != "success" ]; then
            echo "Deployment blocked! The latest test run on branch '${{ github.ref_name }}' did not succeed. Status: $CONCLUSION"
            exit 1
          fi
          echo "Tests are cleared! Proceeding to deployment..."

  build-and-push:
    needs: verify-tests
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:latest

      - name: Build and push Migrations image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/migrations/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-goose:latest

  deploy:
    needs: build-and-push
    name: Deploy to Server
    runs-on: self-hosted 

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Create .env file
        run: |
          touch .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "DOCKER_DB_URL=${{ secrets.DOCKER_DB_URL }}" >> .env
          echo "PORT=${{ secrets.PORT }}" >> .env
          echo "TUNNEL_TOKEN=${{ secrets.TUNNEL_TOKEN }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env

      - name: Pull and Deploy with Docker Compose
        run: |
          # Pulls the latest pre-built images from GHCR
          docker compose pull
          # Runs the containers WITHOUT the --build flag
          docker compose up -d 
      
      - name: shutdown services
        if: failure()
        run: docker compose down

      - name: Cleanup old images
        run: docker image prune -af
