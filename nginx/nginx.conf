user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include mime.types;
    default_type application/octet-stream;
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr cache: $upstream_cache_status';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # Cache configuration
    proxy_cache_path /var/cache/nginx/website levels=1:2 keys_zone=website_cache:10m 
                     max_size=100m inactive=60m use_temp_path=off;
    proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m 
                    max_size=50m inactive=10m use_temp_path=off;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Upstream with dynamic Docker DNS resolution
    upstream backend_servers {
        least_conn;
        server api:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Main server block
    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        location /status {
            stub_status on;
            allow 172.20.0.1;
            allow 127.0.0.1;
            deny all;
        }
        
        # Health check endpoint (no caching)
        location /health {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # No caching for health checks
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # Default location - reverse proxy with caching
        location / {
            limit_req zone=general burst=20 nodelay;
            root /usr/share/nginx/html;
            index index.html index.htm;

            try_files $uri $uri/ /index.html;
            # proxy_pass http://backend_servers;
            # proxy_http_version 1.1;
            # proxy_set_header Connection "";
            # proxy_set_header Host $host;
            # proxy_set_header X-Real-IP $remote_addr;
            # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # proxy_set_header X-Forwarded-Proto $scheme;

            # # Cache HTML for 10 minutes
            # proxy_cache website_cache;
            # proxy_cache_valid 200 10m;
            # proxy_cache_valid 404 1m;
            # proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            # add_header X-Cache-Status $upstream_cache_status;

            # # Timeouts
            # proxy_connect_timeout 60s;
            # proxy_send_timeout 60s;
            # proxy_read_timeout 60s;
        }

        location /api/ {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Authorization $http_authorization;
            proxy_pass_request_headers on;

            # caching stuff
            proxy_buffering on;
            # Cache HTML for 10 minutes
            proxy_cache api_cache;
            proxy_cache_lock on; # lock cache on 1st request then serve the rest of requests
            proxy_cache_lock_timeout 5s;
            proxy_cache_background_update on; # updating cache in background when stale
            proxy_cache_methods GET; # only cache GET requests
            proxy_cache_valid 200 10m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504; # serve stale cache when backend error
            add_header X-Cache-Status $upstream_cache_status;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        error_page 403 =302 /;

        # Deny access to sensitive files
        location ~ /\. {
            deny all;
        }
    }
}