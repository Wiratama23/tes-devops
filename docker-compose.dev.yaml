services:
  nginx:
    image: nginx:alpine
    ports:
      # Access your frontend via localhost:80
      - "80:80"
    volumes:
      # Live-mounts your files so you can see HTML changes instantly
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/mime.types:/etc/nginx/mime.types:ro
      # - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend-network

  api:
    # Removed the GHCR image link to force a local build every time
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      # Un-commented and exposed so you can test API endpoints directly via localhost:8080
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgres://development_user:admin123@postgres:5432/devdb?sslmode=disable
      - PORT=8080
      # The host-running Next.js dev server lives at localhost:3000; the
      # browser hits the API through nginx on localhost:80. Both are listed
      # explicitly so we don't depend on the in-code default.
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:4000,http://localhost}
      - UPLOADS_DIR=/var/lib/api/uploads
      - DEFAULT_IMAGE_SOURCE=/etc/api/assets/default_image.jpg
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-false}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      - uploads_dev:/var/lib/api/uploads
      # Make the bundled default image available so the api container can copy
      # it into the uploads volume on first start.
      - ./assets/default_image.jpg:/etc/api/assets/default_image.jpg:ro
    depends_on:
      postgres:
       condition: service_healthy
      goose:
        condition: service_completed_successfully
    networks:
      - backend-network
      - db
    # Removed the 'deploy' block (replicas and limits) for a lighter local footprint
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: postgres_db_dev
    ports:
      # Exposed locally so you can connect database GUI tools (like DBeaver or pgAdmin)
      - "5432:5432"
    environment:
      POSTGRES_USER: development_user
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: devdb
    volumes:
      # Renamed volume to prevent any clashes
      - pgdata_dev:/var/lib/postgresql/data
    networks:
      - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U development_user -d devdb"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  goose:
    build:
      context: ./backend
      dockerfile: migrations/Dockerfile
    container_name: goose_migration_dev
    networks:
      - db
    volumes:
      - ./backend/migrations:/migrations
    working_dir: /migrations
    environment:
      - GOOSE_DRIVER=postgres
      - GOOSE_DBSTRING=postgres://development_user:admin123@postgres:5432/devdb?sslmode=disable
    command: up
    depends_on:
      postgres:
       condition: service_healthy

  # ---------------------------------------------------------------------------
  # Optional: containerized frontend.
  # In dev we run Next.js on the host (`bun run dev` in ./frontend) for fast
  # HMR. To containerize the frontend later, add a Dockerfile under ./frontend
  # and uncomment the block below — and the matching `proxy_pass` block in
  # nginx/nginx.conf at `location /`.
  # ---------------------------------------------------------------------------
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NEXT_PUBLIC_API_BASE_URL=/api
  #     - INTERNAL_API_URL=http://nginx/api
  #   depends_on:
  #     api:
  #       condition: service_healthy
  #   networks:
  #     - backend-network

volumes:
  pgdata_dev: {}
  uploads_dev: {}

networks:
  db:
    driver: bridge
  backend-network:
    driver: bridge
