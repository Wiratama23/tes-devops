services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/mime.types:/etc/nginx/mime.types:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend-network
  api:
    image: ghcr.io/wiratama23/tes-devops-api:latest
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # ports:
    #   # Exposing port 8080 to the host machine
    #   - "8080:${PORT}"
    environment:
      # Pass database connection strings here so your app can read them via os.Getenv
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DOCKER_DB_URL}
      - PORT=${PORT}
      - UPLOADS_DIR=/var/lib/api/uploads
      - DEFAULT_IMAGE_SOURCE=/etc/api/assets/default_image.jpg
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-false}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      - uploads_test:/var/lib/api/uploads
      - ./assets/default_image.jpg:/etc/api/assets/default_image.jpg:ro
    depends_on:
      postgres:
       condition: service_healthy
      goose:
        condition: service_completed_successfully
    networks:
      - backend-network
      - db
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.8'
          memory: 1g
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  goose:
    image: ghcr.io/wiratama23/tes-devops-goose:latest
    build:
      context: ./backend
      dockerfile: migrations/Dockerfile
    container_name: goose_migration
    networks:
      - db
    # This creates the live two-way portal!
    volumes:
      - ./backend/migrations:/migrations
    # Set the working directory to the folder we just mounted
    working_dir: /migrations
    # We pass the environment variables so Goose knows how to connect to Postgres
    environment:
      - GOOSE_DRIVER=postgres
      - GOOSE_DBSTRING=${DOCKER_DB_URL}
    command: up
    depends_on:
      postgres:
       condition: service_healthy

  frontend:
    image: ghcr.io/wiratama23/tes-devops-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_BASE_URL=/api
      - INTERNAL_API_URL=http://nginx/api
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend-network

volumes:
  pgdata: {}
  uploads_test: {}

networks:
  db:
    driver: bridge
  backend-network:
    driver: bridge
  tunnel-network:
    driver: bridge
